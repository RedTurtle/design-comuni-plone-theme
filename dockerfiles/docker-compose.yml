version: '3'

services:
  addon-dev:
    build:
      context: ../
      dockerfile: ./dockerfiles/Dockerfile.dev
      args:
        ADDON_NAME: '${ADDON_NAME}'
        ADDON_PATH: '${ADDON_PATH}'
        VOLTO_VERSION: ${VOLTO_VERSION:-19.1.5}
    volumes:
      - ${CURRENT_DIR}:/app/packages/${ADDON_PATH}/
      # Prevent the host's local node_modules (if present, e.g. from running
      # `yarn install` standalone in the addon repo for editor tooling) from
      # shadowing the app-level dependencies already hoisted in the image.
      # A stale/duplicate react copy here causes "Invalid hook call" errors.
      - /app/packages/${ADDON_PATH}/node_modules
    environment:
      RAZZLE_INTERNAL_API_PATH: http://backend:8080/Plone
      RAZZLE_API_PATH: http://localhost:8080/Plone
    ports:
      - 3000:3000
      - 3001:3001
    tty: true
    profiles:
      - dev
      - unittest

    # Use these to debug
    # stdin_open: true
    # entrypoint: ''
    # command: /bin/bash

  addon-prod:
    build:
      context: ../
      dockerfile: ./dockerfiles/Dockerfile
      args:
        ADDON_NAME: '${ADDON_NAME}'
        ADDON_PATH: '${ADDON_PATH}'
        VOLTO_VERSION: ${VOLTO_VERSION:-19.1.5}
    environment:
      RAZZLE_INTERNAL_API_PATH: http://backend:8080/Plone
      RAZZLE_API_PATH: http://localhost:8080/Plone
    ports:
      - 3000:3000
    tty: true
    profiles:
      - prod

  backend:
    # image: plone/plone-backend:${PLONE_VERSION:-6}
    image: ghcr.io/redturtle/iocomune-backend:latest
    environment:
      SITE: Plone
      PROFILES: design.plone.policy:default
      CORS_ALLOW_ORIGIN: '*'
    ports:
      - 8080:8080
    profiles:
      - dev
      - prod
